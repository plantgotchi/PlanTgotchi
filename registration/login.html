<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanTgotchi - 로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fdfdf5; font-family: 'Noto Sans KR', sans-serif; }
        .login-container { max-width: 400px; margin: 100px auto; padding: 30px; background: white; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .brand-font { font-family: 'Gaegu', cursive; color: #2d6a4f; text-align: center; font-size: 3rem; margin-bottom: 20px; }
        .btn-success { background-color: #2d6a4f; border: none; border-radius: 50px; padding: 12px; font-weight: bold; }
    </style>
    <!-- PWA 필수 태그 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#238636">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="login-container">
        <h1 class="brand-font">PlanTgotchi</h1>
        <h4 class="text-center mb-4">다시 오셨군요! 👋</h4>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success w-100 mt-3">로그인</button>
        </form>
        <p class="text-center mt-3 small">아직 회원이 아니신가요? <a href="{% url 'signup' %}" class="text-success">회원가입</a></p>
    </div>

<!-- PWA 서비스 워커 등록 -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                console.log('✅ PWA ServiceWorker 등록 성공! (설치 가능 상태)', reg.scope);
            }).catch(err => {
                console.log('❌ PWA ServiceWorker 등록 실패:', err);
            });
        });
    }
</script>
</body>
</html>
